<html lang="th">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Playfair+Display:wght@700;900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d4af37;
      --gold-bright: #f9e27d;
      --velvet: #4a0404;
      --bg: #0a0a0a;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: 'Quicksand', 'Mitr', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 50% -20%, #2c3e50 0%, transparent 50%),
        linear-gradient(to bottom, #0a0a0a 0%, #1a1a1a 100%);
      color: #fff;
      margin: 0;
      padding: 0;
    }

      /* --- New Header & Side Menu --- */
    .main-header {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 70px;
        display: flex;
        justify-content: flex-end; /* ดันปุ่มไปขวาสุด */
        align-items: center;
        padding: 0 30px;
        z-index: 1000; /* ให้อยู่เหนือทุกอย่าง */
        background: transparent;
    }

    .menu-trigger {
        background: none; border: none; cursor: pointer;
        display: flex; flex-direction: column; gap: 6px;
    }

    .menu-trigger span {
        display: block; width: 28px; height: 1.5px;
        background-color: #333; transition: 0.3s;
    }

    /* Backdrop พื้นหลังตอนเปิดเมนู */
    .menu-backdrop {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.2);
        opacity: 0; visibility: hidden;
        transition: 0.4s; z-index: 2000;
        backdrop-filter: blur(2px);
    }

    /* ตัวเมนูเฉียงสีชมพู */
    .side-menu {
        position: fixed; top: 0; right: -100%; /* ซ่อนไว้ขวาสุด */
        width: 80%; max-width: 400px; height: 100%;
        background-color: #ff8da1; /* สีชมพูแบบ =LOVE */
        z-index: 2001;
        transition: 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        /* ตัดทรงเฉียง */
        clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
        padding: 60px 40px;
        display: flex; flex-direction: column;
    }

    /* เมื่อเมนูทำงาน */
    .menu-active .menu-backdrop { opacity: 1; visibility: visible; }
    .menu-active .side-menu { right: 0; }

    .close-menu-btn {
        align-self: flex-end;
        background: none; border: none;
        color: white; font-size: 30px; cursor: pointer;
        margin-bottom: 30px;
    }

    .side-nav-links { list-style: none; padding: 0; margin: 0; }
    .side-nav-links li { margin: 20px 0; text-align: right; }
    .side-nav-links a {
        text-decoration: none; color: white;
        font-size: 18px; font-weight: 500;
        letter-spacing: 2px; transition: 0.3s;
    }
    .side-nav-links a:hover { color: #fff9e6; padding-right: 10px; }

    /* ปรับปุ่มเมนูให้เห็นชัดขึ้นบนรูป Banner */
    .menu-trigger span { background-color: #ffffff; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
    
    .theater-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    /* Logo & Header - ปรับขนาดตามจอ */
    .theater-logo {
      width: clamp(150px, 40vw, 250px);
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 0 15px var(--gold));
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--gold)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--gold-bright)); }
    }

    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 8vw, 3.5rem); /* ยืดหยุ่นตามหน้าจอ */
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: clamp(2px, 1vw, 5px);
      margin: 0;
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    /* Management Section - ปรับระยะห่าง */
    .management-zone {
      display: flex;
      justify-content: center;
      gap: clamp(15px, 4vw, 40px);
      margin: 40px 0 60px;
      flex-wrap: wrap;
    }

    .admin-card {
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: 20px;
      width: clamp(240px, 80vw, 280px); /* ไม่กว้างเกินหน้าจอมือถือ */
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }

    .admin-card::before {
      content: 'OFFICIAL';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: #000;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 2px 15px;
      border-radius: 10px;
    }

    /* Member Section Label */
    .section-label {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      color: var(--gold);
      border-bottom: 2px solid var(--gold);
      margin: 40px 0 25px;
      padding-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* Grid - ปรับให้แสดง 2 คอลัมน์ในมือถือ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* เล็กลงเพื่อประหยัดพื้นที่ */
      gap: clamp(10px, 3vw, 30px);
    }

    /* สำหรับคอมพิวเตอร์ให้ขนาดใหญ่ขึ้นหน่อย */
    @media (min-width: 768px) {
        .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }

    .card {
      position: relative;
      background: #151515;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* เอฟเฟกต์ Hover เฉพาะอุปกรณ์ที่มีเมาส์ */
    @media (hover: hover) {
        .card:hover {
          transform: translateY(-10px) scale(1.02);
          border-color: var(--gold);
          box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
        }
    }

    .card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      transition: 0.5s;
    }

    .info {
      padding: 15px 10px;
      background: linear-gradient(to top, #000 80%, transparent);
      position: absolute;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
    }

    .name { 
      font-size: clamp(0.9rem, 3vw, 1.2rem); 
      font-weight: 600; 
      color: #fff; 
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis; /* ถ้าชื่อยาวเกินให้เป็น ... */
    }
    
    .pos { 
      font-size: clamp(0.6rem, 2vw, 0.8rem); 
      color: var(--gold); 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      margin-top: 3px; 
    }

    .captain-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #e74c3c;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 800;
      z-index: 10;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      color: #555;
      font-size: 0.75rem;
      border-top: 1px solid #222;
      padding: 30px 20px;
    }

  </style>
